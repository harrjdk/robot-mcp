spring.application.name=robot-mcp
spring.threads.virtual.enabled=true
spring.main.headless=false

# Bind to localhost only — this server has full RPA control over the machine.
# Change to 0.0.0.0 only if you are intentionally exposing it on the network.
server.address=127.0.0.1

spring.ai.mcp.server.name=robot-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=streamable

management.endpoints.web.exposure.include=health,mappings
